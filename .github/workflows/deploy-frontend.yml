name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'futfun-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: futfun-frontend

      - name: Build Flutter web
        run: flutter build web --no-tree-shake-icons --pwa-strategy=none
        working-directory: futfun-frontend

      - name: Deploy to Firebase Hosting
        working-directory: futfun-frontend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          output=$(npx firebase-tools deploy --only hosting --project futfun-385ea 2>&1)
          echo "$output"
          # Firebase returns 400 when the build content is identical to the active version.
          # Treat this as success — the correct code is already deployed.
          if echo "$output" | grep -q "is the current active version"; then
            echo "Already up to date — no deploy needed."
            exit 0
          fi
