name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'futfun-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: futfun-frontend

      - name: Build Flutter web
        run: flutter build web --no-tree-shake-icons --pwa-strategy=none
        working-directory: futfun-frontend

      - name: Deploy to Firebase Hosting
        working-directory: futfun-frontend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set +e
          npx firebase-tools deploy --only hosting --project futfun-385ea 2>&1 | tee /tmp/fb_out.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          # Firebase returns 400 when the compiled output is identical to the active
          # version — treat as success since the correct code is already deployed.
          if [ "$exit_code" -ne 0 ] && ! grep -q "is the current active version" /tmp/fb_out.txt; then
            echo "Firebase deploy failed with exit code $exit_code"
            exit "$exit_code"
          fi
          echo "Deploy complete (or already up to date)."
