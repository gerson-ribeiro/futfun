name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'futfun-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: futfun-498118

      - name: Build and push Docker image
        run: gcloud builds submit --project futfun-498118
        working-directory: futfun-backend

      - name: Apply database migrations
        id: migrate
        continue-on-error: true
        run: |
          gcloud run jobs deploy futfun-migrate \
            --project futfun-498118 \
            --image gcr.io/futfun-498118/futfun-backend:latest \
            --region southamerica-east1 \
            --command npx \
            --args "prisma,migrate,deploy" \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --max-retries 0
          gcloud run jobs execute futfun-migrate \
            --project futfun-498118 \
            --region southamerica-east1 \
            --wait

      - name: Show migration logs on failure
        if: steps.migrate.outcome == 'failure'
        run: |
          echo "=== Migration job failed — fetching logs ==="
          sleep 5
          gcloud logging read \
            'resource.type="cloud_run_job" AND resource.labels.job_name="futfun-migrate"' \
            --project futfun-498118 \
            --limit 80 \
            --format "value(textPayload,jsonPayload.message)" \
            --freshness 10m || true
          exit 1

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy futfun-backend \
            --project futfun-498118 \
            --image gcr.io/futfun-498118/futfun-backend:latest \
            --region southamerica-east1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 1 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,FOOTBALL_DATA_ORG_API_KEY=FOOTBALL_DATA_ORG_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest,ADMIN_SEED_EMAIL=ADMIN_SEED_EMAIL:latest,APP_BASE_URL=APP_BASE_URL:latest,CORS_ALLOWED_ORIGINS=CORS_ALLOWED_ORIGINS:latest,WEB_APP_URL=WEB_APP_URL:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,API_FOOTBALL_KEY=API_FOOTBALL_KEY:latest"
