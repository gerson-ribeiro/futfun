steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/futfun-backend:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/futfun-backend:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/futfun-backend:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/futfun-backend:latest'

  # Create/update the migration job (uses Cloud Run's SA which already has secret access)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - futfun-migrate
      - '--image=gcr.io/$PROJECT_ID/futfun-backend:$BUILD_ID'
      - '--region=southamerica-east1'
      - '--command=npx'
      - '--args=prisma,migrate,deploy'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest'
      - '--max-retries=0'

  # Execute the migration job and wait for it to complete before deploying
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - futfun-migrate
      - '--region=southamerica-east1'
      - '--wait'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - futfun-backend
      - '--image=gcr.io/$PROJECT_ID/futfun-backend:$BUILD_ID'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,MICROSOFT_TENANT_ID=MICROSOFT_TENANT_ID:latest,FOOTBALL_DATA_ORG_API_KEY=FOOTBALL_DATA_ORG_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest,ADMIN_SEED_EMAIL=ADMIN_SEED_EMAIL:latest,APP_BASE_URL=APP_BASE_URL:latest,CORS_ALLOWED_ORIGINS=CORS_ALLOWED_ORIGINS:latest,WEB_APP_URL=WEB_APP_URL:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,API_FOOTBALL_KEY=API_FOOTBALL_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/futfun-backend:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/futfun-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
