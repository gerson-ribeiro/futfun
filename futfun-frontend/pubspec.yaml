name: futfun
description: "FutFun - World Cup 2026 Betting Pool"

publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0

  # HTTP & Networking
  dio: ^5.4.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Routing
  go_router: ^14.0.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # WebSocket
  socket_io_client: ^2.0.0

  # Charts
  fl_chart: ^0.65.0

  # SVG images (team crests from football-data.org)
  flutter_svg: ^2.0.0

  # Utils
  intl: ^0.19.0

  # URL Launcher
  url_launcher: ^6.2.0

  # Deep Links
  app_links: ^6.3.2

  # Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/futfun-icon.png"
  web:
    generate: true
    image_path: "assets/icon/futfun-icon.png"
    background_color: "#1B5E20"
    theme_color: "#1B5E20"
  windows:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
